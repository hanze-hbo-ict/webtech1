repos:
  - repo: local
    hooks:
      - id: no-commit-to-main
        name: Blokkeer commits op main
        language: system
        entry: .claude/no-commit-to-main.sh
        pass_filenames: false
        always_run: true

      - id: pymarkdown
        name: Markdown linting (pymarkdown)
        language: system
        entry: uv run pymarkdown --config pyproject.toml scan
        types: [markdown]
        files: ^docs/.*\.md$
        pass_filenames: true
